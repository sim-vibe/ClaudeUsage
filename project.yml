name: ClaudeUsage
options:
  bundleIdPrefix: com.simvibe
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/ClaudeUsage
    settings:
      base:
        PRODUCT_NAME: "Token Meter"
        PRODUCT_BUNDLE_IDENTIFIER: com.simvibe.ClaudeUsage
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ClaudeUsage.entitlements
        # App Store distribution: managed signing on the Apple-account machine.
        # Local verification overrides these at the xcodebuild CLI
        # (CODE_SIGN_IDENTITY="-", CODE_SIGN_STYLE=Manual, ENABLE_HARDENED_RUNTIME=NO).
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
