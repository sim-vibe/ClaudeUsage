name: ClaudeUsage
options:
  bundleIdPrefix: com.simvibe
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClaudeUsage
    settings:
      base:
        PRODUCT_NAME: "Token Meter"
        PRODUCT_BUNDLE_IDENTIFIER: com.simvibe.ClaudeUsage
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ClaudeUsage.entitlements
        # Local verification uses ad-hoc signing ("Sign to Run Locally").
        # For App Store: set DEVELOPMENT_TEAM + CODE_SIGN_STYLE=Automatic in Xcode.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        MACOSX_DEPLOYMENT_TARGET: "13.0"
